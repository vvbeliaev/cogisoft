<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg    { fill: #faf9f5; }
      .mark  { fill: none; stroke: #c96442; stroke-linecap: round; stroke-linejoin: round; }
      .solid { fill: #c96442; stroke: none; }
      @media (prefers-color-scheme: dark) {
        .bg   { fill: #1a1a18; }
      }
    </style>
  </defs>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="50" class="bg"/>

  <!-- ① Outer C frame -->
  <path class="mark" d="M79.7 79.7 A42 42 0 1 1 79.7 20.3" stroke-width="2.5"/>

  <!-- ② Calibration ticks -->
  <line class="mark" x1="50"   y1="8"    x2="50"   y2="15"   stroke-width="2"/>
  <line class="mark" x1="20.3" y1="20.3" x2="25.3" y2="25.3" stroke-width="2"/>
  <line class="mark" x1="20.3" y1="79.7" x2="25.3" y2="74.7" stroke-width="2"/>
  <line class="mark" x1="50"   y1="92"   x2="50"   y2="85"   stroke-width="2"/>

  <!-- ② PCB trace stubs -->
  <line class="mark" x1="8"  y1="50" x2="20" y2="50" stroke-width="2.5"/>
  <line class="mark" x1="80" y1="50" x2="92" y2="50" stroke-width="2.5"/>

  <!-- ③ Core S glyph -->
  <path class="mark" d="M20 50 A21.21 21.21 0 1 1 50 50 A21.21 21.21 0 1 0 80 50" stroke-width="7"/>

  <!-- ③ Terminal pads -->
  <circle class="solid" cx="20" cy="50" r="4.5"/>
  <circle class="solid" cx="80" cy="50" r="4.5"/>

  <!-- ③ Junction via -->
  <circle class="mark" cx="50" cy="50" r="4.5" stroke-width="2"/>

  <!-- ① C frame caps -->
  <circle class="solid" cx="79.7" cy="79.7" r="3"/>
  <circle class="solid" cx="79.7" cy="20.3" r="3"/>
</svg>
